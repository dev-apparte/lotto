<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Loteria</title>
<style>
  :root {
    --gold: #d4af37;
    --serif: Didot, 'Big Caslon', 'Bodoni MT', 'Book Antiqua', 'Palatino Linotype', Georgia, 'Times New Roman', serif;
  }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #000; overflow: hidden;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }
  body {
    display: flex; flex-direction: column;
    font-family: var(--serif);
    color: var(--gold);
  }
  .titles {
    flex: 0 0 auto;
    text-align: center;
    padding: 3vh 4vw 1.6vh;
  }
  .titles div {
    font-size: clamp(28px, 6.4vw, 56px);
    letter-spacing: .03em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .titles hr {
    width: 34vw; max-width: 280px;
    border: none; border-top: 1px solid var(--gold);
    opacity: .6;
    margin: 1.4vh auto;
  }
  #stage {
    flex: 1 1 auto;
    min-height: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4vw;
  }
  #display {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    display: none;
    border-radius: 6px;
  }
  .controls {
    flex: 0 0 auto;
    display: flex; flex-direction: column; align-items: center; gap: 1.6vh;
    padding: 3vh 0 4vh;
  }
  #doneMsg {
    text-align: center;
    letter-spacing: .03em;
    font-size: clamp(16px, 3.2vw, 26px);
    line-height: 1.35;
  }
  button {
    font-size: 6vw;
    padding: 2.4vh 8vw;
    border: none; border-radius: 999px;
    background: var(--gold); color: #111;
    box-shadow: 0 6px 20px rgba(0,0,0,.5);
    cursor: pointer;
  }
  button:disabled { opacity: .5; }
  #startBtn { font-size: 7vw; }
  #restartBtn {
    background: transparent; color: var(--gold);
    border: 2px solid var(--gold);
    box-shadow: none;
  }
</style>
</head>
<body>
<div class="titles">
  <div id="titleEs"></div>
  <hr>
  <div id="titleDe"></div>
</div>

<div id="stage">
  <img id="display" alt="">
</div>

<div class="controls">
  <button id="startBtn">&#9654;</button>
  <button id="nextBtn" style="display:none">&#10148;</button>
  <div id="doneMsg" style="display:none">
    <div>¡Completo!</div>
    <div>Fertig!</div>
  </div>
  <button id="restartBtn" style="display:none">&#8635;</button>
</div>

<script>
(function () {
  const TOTAL = 32; // ponytail: actualizar cuando lleguen las 36 imagenes
  const TITLES = {
    1: ['Las llaves', 'Die Schlüssel'],
    2: ['El champagne', 'Der Champagner'],
    3: ['El primer baile', 'Der erste Tanz'],
    4: ['El beso', 'Der Kuss'],
    5: ['El novio', 'Der Bräutigam'],
    6: ['Los anillos', 'Die Ringe'],
    7: ['El piano', 'Das Klavier'],
    8: ['¡Sí acepto!', 'Ja, ich will!'],
    9: ['El corazón', 'Das Herz'],
    10: ['El Dj', 'Der DJ'],
    11: ['La selfie', 'Das Selfie'],
    12: ['El pastel', 'Die Torte'],
    13: ['Las almendras', 'Die Mandeln'],
    14: ['La novia', 'Die Braut'],
    15: ['¡Recién casados!', 'Frisch verheiratet!'],
    16: ['El ramo', 'Der Blumenstrauß'],
    17: ['El anillo', 'Der Ring'],
    18: ['Tikal', 'Tikal'],
    19: ['Antigua Guatemala', 'Antigua Guatemala'],
    20: ['Atitlán', 'Atitlán'],
    21: ['Puerta de Brandeburgo', 'Brandenburger Tor'],
    22: ['El velo', 'Der Schleier'],
    23: ['Catedral de Berlin', 'Berliner Dom'],
    24: ['Las copas', 'Die Gläser'],
    25: ['Las fotos', 'Die Fotos'],
    26: ['Torre Alexanderplatz', 'Berliner Fernsehturm'],
    27: ['La torre Eiffel', 'Der Eiffelturm'],
    28: ['Guatemala', 'Guatemala'],
    29: ['Alemania', 'Deutschland'],
    30: ['El regalo', 'Das Geschenk'],
    31: ['La fiesta', 'Die Feier'],
    32: ['La ceremonia', 'Die Zeremonie']
  };
  const display = document.getElementById('display');
  const titleEs = document.getElementById('titleEs');
  const titleDe = document.getElementById('titleDe');
  const startBtn = document.getElementById('startBtn');
  const nextBtn = document.getElementById('nextBtn');
  const restartBtn = document.getElementById('restartBtn');
  const doneMsg = document.getElementById('doneMsg');

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function src(n) { return 'images/' + n + '.jpg'; }

  const sequence = shuffle(Array.from({ length: TOTAL }, (_, i) => i + 1));
  let idx = -1;
  let animating = false;

  // precarga
  for (let i = 1; i <= TOTAL; i++) new Image().src = src(i);

  startBtn.addEventListener('click', () => {
    startBtn.style.display = 'none';
    nextBtn.style.display = 'inline-block';
    display.style.display = 'block';
    spinTo(0);
  });

  nextBtn.addEventListener('click', () => {
    if (animating || idx + 1 >= TOTAL) return;
    spinTo(idx + 1);
  });

  restartBtn.addEventListener('click', () => {
    shuffle(sequence);
    idx = -1;
    restartBtn.style.display = 'none';
    doneMsg.style.display = 'none';
    nextBtn.style.display = 'inline-block';
    spinTo(0);
  });

  function spinTo(nextIdx) {
    animating = true;
    nextBtn.disabled = true;
    idx = nextIdx;
    const target = sequence[idx];
    const duration = 4000;
    const start = performance.now();

    function tick(now) {
      const elapsed = now - start;
      if (elapsed >= duration) {
        display.src = src(target);
        const t = TITLES[target];
        titleEs.textContent = t[0];
        titleDe.textContent = t[1];
        animating = false;
        nextBtn.disabled = false;
        if (idx + 1 >= TOTAL) {
          nextBtn.style.display = 'none';
          doneMsg.style.display = 'block';
          restartBtn.style.display = 'inline-block';
        }
        return;
      }
      display.src = src(Math.floor(Math.random() * TOTAL) + 1);
      const progress = elapsed / duration;
      const delay = 40 + Math.pow(progress, 3) * 320; // arranca rapido, frena al final
      setTimeout(() => requestAnimationFrame(tick), delay);
    }
    requestAnimationFrame(tick);
  }
})();
</script>
</body>
</html>
